# MAIN REVERSE PROXY
# This is the entry point for ALL traffic to didriksi.com
# It decides which Docker container handles each request based on the URL path
#
# How it works:
#   Browser -> didriksi.com:80 -> THIS nginx -> routes to correct container
#
# Docker Compose creates an internal network where containers can reach
# each other by name (e.g., "landing", "coursecatalog-frontend")

server {
    listen 80;
    server_name didriksi.com localhost;

    # didriksi.com/ -> Landing page container
    # The landing container serves our static HTML (retro homepage)
    location / {
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # didriksi.com/coursecatalog/api/ -> FastAPI backend container
    # IMPORTANT: This must come BEFORE /coursecatalog/ so nginx matches
    # API routes first (nginx uses longest prefix match, but order matters
    # for regex locations)
    # The trailing slash on proxy_pass strips /coursecatalog/api/ prefix,
    # so /coursecatalog/api/courses -> http://coursecatalog-api:8000/courses
    location /coursecatalog/api/ {
        proxy_pass http://coursecatalog-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # didriksi.com/coursecatalog/ -> React frontend container
    # The trailing slash on proxy_pass strips the /coursecatalog/ prefix,
    # so /coursecatalog/assets/main.js -> http://coursecatalog-frontend:80/assets/main.js
    location /coursecatalog/ {
        proxy_pass http://coursecatalog-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # didriksi.com/housingclassifier/ -> Same landing container, different path
    # The landing container also serves the housing classifier static page
    location /housingclassifier/ {
        proxy_pass http://landing:80/housingclassifier/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
