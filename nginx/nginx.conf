# MAIN REVERSE PROXY
# This is the entry point for ALL traffic to didriksi.com
# It decides which Docker container handles each request based on the URL path
#
# How it works:
#   Browser -> didriksi.com:443 (HTTPS) -> THIS nginx -> routes to correct container
#   Browser -> didriksi.com:80  (HTTP)  -> redirect to HTTPS

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name didriksi.com www.didriksi.com;
    return 301 https://didriksi.com$request_uri;
}

# HTTPS server
server {
    listen 443 ssl;
    server_name didriksi.com www.didriksi.com;

    ssl_certificate /etc/letsencrypt/live/didriksi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/didriksi.com/privkey.pem;

    # didriksi.com/ -> Landing page container
    location / {
        proxy_pass http://landing:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # didriksi.com/coursecatalog/api/ -> FastAPI backend container
    location /coursecatalog/api/ {
        proxy_pass http://coursecatalog-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # didriksi.com/coursecatalog/ -> React frontend container
    location /coursecatalog/ {
        proxy_pass http://coursecatalog-frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # didriksi.com/housingclassifier/ -> Same landing container, different path
    location /housingclassifier/ {
        proxy_pass http://landing:80/housingclassifier/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
