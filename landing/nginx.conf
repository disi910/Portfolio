# This nginx config serves our static HTML files
# It runs INSIDE the landing container on port 80
# The main reverse proxy (separate container) forwards requests here

server {
    listen 80;

    # Where our HTML files live inside the container
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files, fall back to index.html for any path
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }
}
